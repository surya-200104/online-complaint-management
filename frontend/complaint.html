<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Complaint — ResolveIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0d14;--surface:#111520;--card:#161c2e;--border:#1e2740;--accent:#4f8ef7;--green:#10b981;--text:#e2e8f0;--muted:#64748b;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
nav{padding:18px 60px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,13,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);text-decoration:none;}
.logo span{color:var(--accent);}
nav a{color:var(--muted);text-decoration:none;font-size:14px;margin-left:24px;transition:color .2s;}
nav a:hover{color:var(--text);}
.page{max-width:700px;margin:60px auto;padding:0 20px 80px;}
.page-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:8px;}
.page-sub{color:var(--muted);font-size:15px;margin-bottom:40px;}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.form-group{margin-bottom:24px;}
label{display:block;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.required::after{content:' *';color:var(--red);}
input,select,textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;transition:border .2s;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--card);}
textarea{resize:vertical;min-height:130px;}
.priority-group{display:flex;gap:10px;}
.priority-btn{flex:1;padding:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .2s;text-align:center;}
.priority-btn.active-low{border-color:#10b981;background:rgba(16,185,129,.1);color:#10b981;}
.priority-btn.active-medium{border-color:#f59e0b;background:rgba(245,158,11,.1);color:#f59e0b;}
.priority-btn.active-high{border-color:#ef4444;background:rgba(239,68,68,.1);color:#ef4444;}
.sla-hint{font-size:12px;color:var(--muted);margin-top:8px;}
.submit-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:16px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:8px;}
.submit-btn:hover{background:#3a7de8;transform:translateY(-2px);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.success-box{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);border-radius:16px;padding:32px;text-align:center;display:none;}
.success-icon{font-size:48px;margin-bottom:16px;}
.success-box h3{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--green);margin-bottom:8px;}
.success-box p{color:var(--muted);font-size:14px;line-height:1.7;}
.ticket-id{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--accent);margin:16px 0;}
.deadline-badge{display:inline-block;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#f59e0b;padding:6px 16px;border-radius:100px;font-size:13px;margin-top:8px;}
.copy-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 20px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;margin-top:12px;transition:all .2s;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.new-btn{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;margin-top:16px;transition:all .2s;}
.new-btn:hover{background:#3a7de8;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}nav{padding:16px 20px;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Resolve<span>IQ</span></a>
  <div>
    <a href="status.html">Track Status</a>
    <a href="login.html">Staff Login</a>
  </div>
</nav>

<div class="page">
  <div class="page-title">Submit a Complaint</div>
  <p class="page-sub">Fill in the details below. You'll receive a Ticket ID to track your complaint.</p>

  <div class="form-card" id="formCard">
    <div class="form-row">
      <div class="form-group">
        <label class="required">Full Name</label>
        <input type="text" id="name" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="email@example.com">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+91 ...">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="General">General</option>
          <option value="Technical">Technical</option>
          <option value="Billing">Billing</option>
          <option value="Service">Service Quality</option>
          <option value="Staff">Staff Behavior</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Priority Level</label>
      <div class="priority-group">
        <button class="priority-btn active-low" onclick="setPriority('Low',this)">🟢 Low</button>
        <button class="priority-btn active-medium" onclick="setPriority('Medium',this)" style="border-color:#f59e0b;background:rgba(245,158,11,.1);color:#f59e0b;">🟡 Medium</button>
        <button class="priority-btn" onclick="setPriority('High',this)">🔴 High</button>
      </div>
      <div class="sla-hint" id="slaHint">⏱ SLA deadline: 24 hours (Medium priority)</div>
    </div>

    <div class="form-group">
      <label class="required">Complaint Details</label>
      <textarea id="complaint" placeholder="Describe your complaint in detail..."></textarea>
    </div>

    <div id="errorMsg" style="color:#ef4444;font-size:13px;margin-bottom:12px;display:none;"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitComplaint()">Submit Complaint →</button>
  </div>

  <div class="success-box" id="successBox">
    <div class="success-icon">✅</div>
    <h3>Complaint Submitted!</h3>
    <p>Your Ticket ID is:</p>
    <div class="ticket-id" id="ticketId"></div>
    <div class="deadline-badge" id="deadlineBadge"></div>
    <p style="margin-top:16px;">Save this ID to track your complaint status at any time.</p>
    <br>
    <button class="copy-btn" onclick="copyId()">📋 Copy Ticket ID</button>
    <br>
    <button class="new-btn" onclick="resetForm()">Submit Another</button>
    <a href="status.html" style="display:inline-block;margin-left:12px;"><button class="new-btn" style="background:transparent;border:1px solid var(--border);color:var(--muted);">Track Status</button></a>
  </div>
</div>

<script>
const API = "http://127.0.0.1:5001";
let selectedPriority = "Medium";
let submittedId = null;
const slaMap = {Low:"72 hours",Medium:"24 hours",High:"4 hours"};

function setPriority(p, el) {
  selectedPriority = p;
  document.querySelectorAll('.priority-btn').forEach(b => {
    b.className = 'priority-btn';
  });
  el.className = `priority-btn active-${p.toLowerCase()}`;
  document.getElementById("slaHint").textContent = `⏱ SLA deadline: ${slaMap[p]} (${p} priority)`;
}

async function submitComplaint() {
  const name = document.getElementById("name").value.trim();
  const complaint = document.getElementById("complaint").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const category = document.getElementById("category").value;
  const errEl = document.getElementById("errorMsg");
  const btn = document.getElementById("submitBtn");

  errEl.style.display = "none";
  if (!name) { showErr("Please enter your name"); return; }
  if (!complaint) { showErr("Please describe your complaint"); return; }

  btn.disabled = true; btn.textContent = "Submitting...";

  try {
    const res = await fetch(`${API}/api/submit`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({name,email,phone,category,priority:selectedPriority,complaint})
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error||"Submission failed"); btn.disabled=false; btn.textContent="Submit Complaint →"; return; }

    submittedId = data.id;
    document.getElementById("ticketId").textContent = `#${String(data.id).padStart(5,'0')}`;
    const d = new Date(data.sla_deadline);
    document.getElementById("deadlineBadge").textContent = `⏰ SLA Deadline: ${d.toLocaleString()}`;
    document.getElementById("formCard").style.display = "none";
    document.getElementById("successBox").style.display = "block";
  } catch(e) {
    showErr("Cannot connect to server.");
    btn.disabled=false; btn.textContent="Submit Complaint →";
  }
}

function showErr(msg) {
  const e = document.getElementById("errorMsg");
  e.textContent = msg; e.style.display = "block";
}

function copyId() {
  navigator.clipboard.writeText(submittedId.toString());
  document.querySelector('.copy-btn').textContent = "✓ Copied!";
  setTimeout(()=>document.querySelector('.copy-btn').textContent="📋 Copy Ticket ID",2000);
}

function resetForm() {
  document.getElementById("formCard").style.display = "block";
  document.getElementById("successBox").style.display = "none";
  document.getElementById("name").value = "";
  document.getElementById("complaint").value = "";
  document.getElementById("email").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("submitBtn").textContent = "Submit Complaint →";
}
</script>
</body>
</html>
