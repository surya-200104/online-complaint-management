<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Status — ResolveIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0d14;--surface:#111520;--card:#161c2e;--border:#1e2740;--accent:#4f8ef7;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
nav{padding:18px 60px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,13,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);text-decoration:none;}
.logo span{color:var(--accent);}
nav a{color:var(--muted);text-decoration:none;font-size:14px;margin-left:24px;transition:color .2s;}
nav a:hover{color:var(--text);}
.page{max-width:680px;margin:60px auto;padding:0 20px 80px;}
.page-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:8px;}
.page-sub{color:var(--muted);font-size:15px;margin-bottom:40px;}
.search-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:32px;}
.input-row{display:flex;gap:12px;}
input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:13px 18px;border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
input:focus{border-color:var(--accent);}
.search-btn{background:var(--accent);color:#fff;border:none;padding:13px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s;}
.search-btn:hover{background:#3a7de8;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px;display:none;}
.ticket-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.ticket-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent);}
.status-badge{padding:7px 18px;border-radius:100px;font-size:13px;font-weight:600;}
.badge-pending{background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.3);color:#94a3b8;}
.badge-progress{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--yellow);}
.badge-resolved{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green);}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.meta-item label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px;}
.meta-item p{font-size:14px;color:var(--text);}
.complaint-text{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:14px;color:var(--text);line-height:1.7;margin-bottom:20px;}
.reply-box{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:20px;}
.reply-box label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--green);display:block;margin-bottom:8px;}
.reply-box p{font-size:14px;line-height:1.7;color:var(--text);}
.timeline{margin-top:24px;}
.timeline h4{font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.tl-item{display:flex;gap:16px;margin-bottom:16px;}
.tl-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;margin-top:5px;flex-shrink:0;}
.tl-content p{font-size:13px;color:var(--muted);}
.tl-content .tl-time{font-size:12px;color:var(--muted);opacity:.6;margin-top:2px;}
.priority-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;margin-left:8px;}
.p-high{background:rgba(239,68,68,.1);color:var(--red);}
.p-medium{background:rgba(245,158,11,.1);color:var(--yellow);}
.p-low{background:rgba(16,185,129,.1);color:var(--green);}
.sla-tag{font-size:12px;color:var(--muted);margin-top:8px;}
.sla-overdue{color:var(--red);}
.error-msg{color:var(--red);font-size:14px;padding:16px;text-align:center;display:none;}
@media(max-width:600px){nav{padding:16px 20px;}.meta-grid{grid-template-columns:1fr;}.input-row{flex-direction:column;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Resolve<span>IQ</span></a>
  <div>
    <a href="complaint.html">Submit</a>
    <a href="login.html">Staff Login</a>
  </div>
</nav>

<div class="page">
  <div class="page-title">Track Your Complaint</div>
  <p class="page-sub">Enter your Ticket ID to see the current status and any replies from staff.</p>

  <div class="search-card">
    <div class="input-row">
      <input type="number" id="complaintId" placeholder="Enter Ticket ID (e.g. 1001)" onkeydown="if(event.key==='Enter')checkStatus()">
      <button class="search-btn" onclick="checkStatus()">Track →</button>
    </div>
    <div class="error-msg" id="errMsg"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="ticket-header">
      <div>
        <div class="ticket-num" id="rTicketNum"></div>
        <span class="priority-tag" id="rPriority"></span>
      </div>
      <span class="status-badge" id="rStatusBadge"></span>
    </div>

    <div class="meta-grid">
      <div class="meta-item"><label>Submitted By</label><p id="rName"></p></div>
      <div class="meta-item"><label>Category</label><p id="rCategory"></p></div>
      <div class="meta-item"><label>Submitted On</label><p id="rCreated"></p></div>
      <div class="meta-item"><label>Last Updated</label><p id="rUpdated"></p></div>
      <div class="meta-item"><label>Assigned To</label><p id="rAssigned"></p></div>
      <div class="meta-item"><label>SLA Deadline</label><p id="rSla"></p></div>
    </div>

    <hr class="divider">

    <label style="font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;">Complaint</label>
    <div class="complaint-text" id="rComplaint"></div>

    <div class="reply-box" id="rReplyBox" style="display:none;">
      <label>Staff Reply</label>
      <p id="rReply"></p>
    </div>

    <div class="timeline" id="timeline">
      <h4>Status Timeline</h4>
      <div id="timelineItems"></div>
    </div>
  </div>
</div>

<script>
const API = "https://online-complaint-management.onrender.com";

async function checkStatus() {
  const id = document.getElementById("complaintId").value.trim();
  const err = document.getElementById("errMsg");
  err.style.display = "none";
  if (!id) { err.textContent = "Please enter a Ticket ID"; err.style.display = "block"; return; }

  try {
    const res = await fetch(`${API}/api/status/${id}`);
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || "Not found"; err.style.display="block"; document.getElementById("resultCard").style.display="none"; return; }
    renderResult(data);
  } catch(e) {
    err.textContent = "Cannot connect to server."; err.style.display = "block";
  }
}

function renderResult(d) {
  document.getElementById("resultCard").style.display = "block";
  document.getElementById("rTicketNum").textContent = `#${String(d.id).padStart(5,'0')}`;

  const pTag = document.getElementById("rPriority");
  pTag.textContent = d.priority || "Medium";
  pTag.className = `priority-tag p-${(d.priority||"Medium").toLowerCase()}`;

  const badge = document.getElementById("rStatusBadge");
  badge.textContent = d.status;
  badge.className = "status-badge " + (d.status==="Resolved"?"badge-resolved":d.status==="In Progress"?"badge-progress":"badge-pending");

  document.getElementById("rName").textContent = d.name;
  document.getElementById("rCategory").textContent = d.category || "General";
  document.getElementById("rCreated").textContent = new Date(d.created_at).toLocaleString();
  document.getElementById("rUpdated").textContent = new Date(d.updated_at).toLocaleString();
  document.getElementById("rAssigned").textContent = d.assigned_to === "Not Assigned" ? "⏳ Pending assignment" : "👤 " + d.assigned_to;
  document.getElementById("rComplaint").textContent = d.complaint;

  const slaEl = document.getElementById("rSla");
  if (d.sla_deadline) {
    const sla = new Date(d.sla_deadline);
    const now = new Date();
    const overdue = now > sla && d.status !== "Resolved";
    slaEl.innerHTML = `<span class="${overdue?'sla-overdue':''}">${overdue?'⚠️ OVERDUE — ':''}${sla.toLocaleString()}</span>`;
  } else { slaEl.textContent = "—"; }

  const replyBox = document.getElementById("rReplyBox");
  if (d.reply) { document.getElementById("rReply").textContent = d.reply; replyBox.style.display="block"; }
  else { replyBox.style.display = "none"; }

  const tl = document.getElementById("timelineItems");
  tl.innerHTML = "";
  const events = [
    {time: d.created_at, text: "Complaint submitted"},
  ];
  if (d.assigned_to !== "Not Assigned") events.push({time: d.updated_at, text: `Assigned to ${d.assigned_to}`});
  if (d.status === "In Progress") events.push({time: d.updated_at, text: "Staff started working on complaint"});
  if (d.status === "Resolved") events.push({time: d.resolved_at || d.updated_at, text: "Complaint resolved ✓"});
  events.reverse().forEach(e => {
    tl.innerHTML += `<div class="tl-item"><div class="tl-dot"></div><div class="tl-content"><p>${e.text}</p><div class="tl-time">${new Date(e.time).toLocaleString()}</div></div></div>`;
  });
}
</script>
</body>
</html>
