<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — ResolveIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0d14;--surface:#111520;--card:#161c2e;--border:#1e2740;--accent:#4f8ef7;--accent2:#7c3aed;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:28px 20px;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;}
.sidebar-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:40px;padding:0 8px;}
.sidebar-logo span{color:var(--accent);}
.sidebar-role{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:16px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--muted);font-size:14px;font-weight:500;margin-bottom:4px;transition:all .2s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:rgba(79,142,247,.08);color:var(--text);}
.nav-item.active{background:rgba(79,142,247,.12);color:var(--accent);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;}
.user-pill{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;}
.user-pill .uname{font-size:14px;font-weight:600;}
.user-pill .urole{font-size:12px;color:var(--muted);margin-top:2px;}
.logout-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{margin-left:240px;flex:1;padding:36px 40px;min-height:100vh;}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
.page-title-wrap h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;}
.page-title-wrap p{color:var(--muted);font-size:14px;margin-top:4px;}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .2s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:32px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.stat-card .s-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.stat-card .s-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;}
.stat-card .s-num.blue{color:var(--accent);}
.stat-card .s-num.yellow{color:var(--yellow);}
.stat-card .s-num.green{color:var(--green);}
.stat-card .s-num.orange{color:#f97316;}
.stat-card .s-num.red{color:var(--red);}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--accent);}
.search-input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:220px;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.table-head{display:grid;grid-template-columns:70px 130px 1fr 100px 110px 130px 160px;gap:0;background:var(--surface);border-bottom:1px solid var(--border);}
.th{padding:12px 16px;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);}
.complaint-row{display:grid;grid-template-columns:70px 130px 1fr 100px 110px 130px 160px;border-bottom:1px solid var(--border);transition:background .15s;align-items:center;}
.complaint-row:last-child{border-bottom:none;}
.complaint-row:hover{background:rgba(255,255,255,.02);}
.td{padding:14px 16px;font-size:13px;}
.td.id{font-family:'Syne',sans-serif;color:var(--accent);font-weight:700;}
.td.name{font-weight:500;}
.td.complaint-text{color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;}
.status-badge,.priority-badge{display:inline-block;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;}
.s-pending{background:rgba(100,116,139,.15);color:#94a3b8;}
.s-progress{background:rgba(245,158,11,.1);color:var(--yellow);}
.s-resolved{background:rgba(16,185,129,.1);color:var(--green);}
.p-high{background:rgba(239,68,68,.1);color:var(--red);}
.p-medium{background:rgba(245,158,11,.1);color:var(--yellow);}
.p-low{background:rgba(16,185,129,.1);color:var(--green);}

/* ACTIONS */
.action-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s;margin-right:4px;}
.action-btn:hover{border-color:var(--accent);color:var(--accent);}
.action-btn.danger:hover{border-color:var(--red);color:var(--red);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:24px;}
.modal label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:16px;}
.modal select,.modal textarea,.modal input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.modal select option{background:var(--card);}
.modal textarea{resize:vertical;min-height:80px;}
.modal-actions{display:flex;gap:12px;margin-top:24px;justify-content:flex-end;}
.btn-save{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:#3a7de8;}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px 24px;border-radius:8px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--red);color:var(--red);}
.modal-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:8px;}
.modal-info strong{color:var(--text);}
.empty-state{text-align:center;padding:60px;color:var(--muted);}
.empty-state .icon{font-size:48px;margin-bottom:16px;}
.empty-state p{font-size:15px;}
.log-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;margin-top:6px;flex-shrink:0;}
.log-text{font-size:13px;color:var(--text);}
.log-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:10px;font-size:14px;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">Resolve<span>IQ</span></div>
  <div class="sidebar-role">Admin Panel</div>
  <button class="nav-item active" onclick="showSection('complaints')">
    <span class="nav-icon">📋</span> All Complaints
  </button>
  <button class="nav-item" onclick="showSection('stats')">
    <span class="nav-icon">📊</span> Analytics
  </button>
  <div class="sidebar-footer">
    <div class="user-pill">
      <div class="uname" id="sidebarName">Admin</div>
      <div class="urole">Administrator</div>
    </div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="main">
  <!-- COMPLAINTS SECTION -->
  <div id="section-complaints">
    <div class="page-header">
      <div class="page-title-wrap">
        <h1>Complaints</h1>
        <p id="complaintCount">Loading...</p>
      </div>
      <button class="refresh-btn" onclick="loadComplaints()">↻ Refresh</button>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="s-label">Total</div><div class="s-num blue" id="statTotal">—</div></div>
      <div class="stat-card"><div class="s-label">Pending</div><div class="s-num yellow" id="statPending">—</div></div>
      <div class="stat-card"><div class="s-label">In Progress</div><div class="s-num orange" id="statProgress">—</div></div>
      <div class="stat-card"><div class="s-label">Resolved</div><div class="s-num green" id="statResolved">—</div></div>
      <div class="stat-card"><div class="s-label">High Priority</div><div class="s-num red" id="statHigh">—</div></div>
    </div>

    <div class="filters">
      <input class="search-input" type="text" id="searchInput" placeholder="🔍 Search complaints..." oninput="filterComplaints()">
      <select class="filter-select" id="filterStatus" onchange="filterComplaints()">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
      </select>
      <select class="filter-select" id="filterPriority" onchange="filterComplaints()">
        <option value="">All Priority</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <div class="th">ID</div>
        <div class="th">Name</div>
        <div class="th">Complaint</div>
        <div class="th">Priority</div>
        <div class="th">Status</div>
        <div class="th">Assigned</div>
        <div class="th">Actions</div>
      </div>
      <div id="complaintsList"></div>
    </div>
  </div>

  <!-- ANALYTICS SECTION -->
  <div id="section-stats" style="display:none;">
    <div class="page-header">
      <div class="page-title-wrap"><h1>Analytics</h1><p>Overview of complaint management performance</p></div>
    </div>
    <div id="analyticsContent" style="color:var(--muted);padding:40px;text-align:center;">Loading analytics...</div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Update Complaint</h2>
    <input type="hidden" id="editId">
    <div class="modal-info" id="editInfo"></div>
    <label>Status</label>
    <select id="editStatus">
      <option value="Pending">Pending</option>
      <option value="In Progress">In Progress</option>
      <option value="Resolved">Resolved</option>
    </select>
    <label>Assign To</label>
    <select id="editAssign"></select>
    <label>Priority</label>
    <select id="editPriority">
      <option value="High">🔴 High</option>
      <option value="Medium">🟡 Medium</option>
      <option value="Low">🟢 Low</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn-save" onclick="saveUpdate()">Save Changes</button>
    </div>
  </div>
</div>

<!-- LOG MODAL -->
<div class="modal-overlay" id="logModal">
  <div class="modal">
    <h2>Activity Log</h2>
    <div id="logContent"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('logModal')">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
 const API = "https://online-complaint-management.onrender.com";
const token = localStorage.getItem("token");
const username = localStorage.getItem("username");
const fullName = localStorage.getItem("full_name");

if (!token) window.location.href = "login.html";
document.getElementById("sidebarName").textContent = fullName || username;

let allComplaints = [];
let staffList = [];

function authHeaders() {
  return {"Content-Type":"application/json","Authorization":`Bearer ${token}`};
}

function showToast(msg, isErr=false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = isErr ? "var(--red)" : "var(--green)";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

function showSection(s) {
  document.getElementById("section-complaints").style.display = s==="complaints"?"block":"none";
  document.getElementById("section-stats").style.display = s==="stats"?"block":"none";
  document.querySelectorAll(".nav-item").forEach((b,i)=>b.classList.toggle("active",[s==="complaints",s==="stats"][i]||false));
  if (s==="stats") loadAnalytics();
}

async function loadStaffList() {
  try {
    const res = await fetch(`${API}/api/admin/staff-list`, {headers:authHeaders()});
    if (res.ok) staffList = await res.json();
  } catch(e) {}
}

async function loadComplaints() {
  try {
    const [cRes, sRes] = await Promise.all([
      fetch(`${API}/api/admin/complaints`, {headers:authHeaders()}),
      fetch(`${API}/api/admin/stats`, {headers:authHeaders()})
    ]);

    if (cRes.status === 401) { window.location.href="login.html"; return; }

    allComplaints = await cRes.json();
    const stats = await sRes.json();

    document.getElementById("statTotal").textContent = stats.total;
    document.getElementById("statPending").textContent = stats.pending;
    document.getElementById("statProgress").textContent = stats.in_progress;
    document.getElementById("statResolved").textContent = stats.resolved;
    document.getElementById("statHigh").textContent = stats.high_priority;
    document.getElementById("complaintCount").textContent = `${allComplaints.length} total complaints`;

    renderComplaints(allComplaints);
    await loadStaffList();
  } catch(e) {
    document.getElementById("complaintsList").innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Cannot connect to server. Make sure Flask is running.</p></div>`;
  }
}

function filterComplaints() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("filterStatus").value;
  const priority = document.getElementById("filterPriority").value;

  const filtered = allComplaints.filter(c =>
    (!search || c.name.toLowerCase().includes(search) || c.complaint.toLowerCase().includes(search) || String(c.id).includes(search)) &&
    (!status || c.status === status) &&
    (!priority || c.priority === priority)
  );
  renderComplaints(filtered);
}

function renderComplaints(list) {
  const el = document.getElementById("complaintsList");
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No complaints found</p></div>`;
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="complaint-row">
      <div class="td id">#${c.id}</div>
      <div class="td name">${c.name}</div>
      <div class="td complaint-text" title="${c.complaint}">${c.complaint}</div>
      <div class="td"><span class="priority-badge p-${(c.priority||"Medium").toLowerCase()}">${c.priority||"Medium"}</span></div>
      <div class="td"><span class="status-badge s-${c.status.toLowerCase().replace(' ','-')}">${c.status}</span></div>
      <div class="td" style="font-size:12px;color:var(--muted)">${c.assigned_to==="Not Assigned"?"<span style='color:var(--red)'>Unassigned</span>":c.assigned_to}</div>
      <div class="td">
        <button class="action-btn" onclick='openEditModal(${JSON.stringify(c)})'>Edit</button>
        <button class="action-btn" onclick="openLogModal(${c.id})">Log</button>
        <button class="action-btn danger" onclick="deleteComplaint(${c.id})">Del</button>
      </div>
    </div>
  `).join("");
}

function openEditModal(c) {
  document.getElementById("editId").value = c.id;
  document.getElementById("editStatus").value = c.status;
  document.getElementById("editPriority").value = c.priority || "Medium";
  document.getElementById("editInfo").innerHTML = `<strong>#${c.id}</strong> — ${c.name}<br><span style='font-size:12px'>${c.complaint.substring(0,120)}${c.complaint.length>120?"...":""}</span>`;

  const assignSel = document.getElementById("editAssign");
  assignSel.innerHTML = `<option value="Not Assigned">Not Assigned</option>`;
  staffList.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.username; opt.textContent = `${s.full_name} (${s.username})`;
    if (c.assigned_to === s.username) opt.selected = true;
    assignSel.appendChild(opt);
  });

  document.getElementById("editModal").classList.add("open");
}

async function saveUpdate() {
  const id = document.getElementById("editId").value;
  const status = document.getElementById("editStatus").value;
  const assigned_to = document.getElementById("editAssign").value;
  const priority = document.getElementById("editPriority").value;

  try {
    const res = await fetch(`${API}/api/update/${id}`, {
      method:"PUT", headers:authHeaders(),
      body: JSON.stringify({status,assigned_to,priority})
    });
    if (res.ok) { closeModal("editModal"); showToast("✓ Complaint updated"); loadComplaints(); }
    else { const d=await res.json(); showToast(d.error||"Update failed",true); }
  } catch(e) { showToast("Server error",true); }
}

async function openLogModal(id) {
  document.getElementById("logModal").classList.add("open");
  document.getElementById("logContent").innerHTML = "<p style='color:var(--muted);font-size:14px'>Loading...</p>";
  try {
    const res = await fetch(`${API}/api/complaints/${id}/log`, {headers:authHeaders()});
    const logs = await res.json();
    if (logs.length === 0) {
      document.getElementById("logContent").innerHTML = "<p style='color:var(--muted);font-size:14px'>No activity logged yet.</p>";
      return;
    }
    document.getElementById("logContent").innerHTML = logs.map(l=>`
      <div class="log-item">
        <div class="log-dot"></div>
        <div>
          <div class="log-text">${l.action.replace(/_/g,' ')} — <strong>${l.details}</strong></div>
          <div class="log-meta">by ${l.performed_by} · ${new Date(l.timestamp).toLocaleString()}</div>
        </div>
      </div>
    `).join("");
  } catch(e) { document.getElementById("logContent").innerHTML = "<p style='color:var(--red)'>Error loading log</p>"; }
}

async function deleteComplaint(id) {
  if (!confirm(`Delete complaint #${id}? This cannot be undone.`)) return;
  try {
    const res = await fetch(`${API}/api/delete/${id}`, {method:"DELETE",headers:authHeaders()});
    if (res.ok) { showToast("✓ Complaint deleted"); loadComplaints(); }
    else showToast("Delete failed",true);
  } catch(e) { showToast("Server error",true); }
}

async function loadAnalytics() {
  try {
    const res = await fetch(`${API}/api/admin/stats`, {headers:authHeaders()});
    const s = await res.json();
    const resolveRate = s.total > 0 ? Math.round((s.resolved/s.total)*100) : 0;
    document.getElementById("analyticsContent").innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;text-align:left;">
        <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;">
          <div style="font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Resolution Rate</div>
          <div style="font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--green)">${resolveRate}%</div>
          <div style="font-size:13px;color:var(--muted);margin-top:8px">${s.resolved} of ${s.total} resolved</div>
        </div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;">
          <div style="font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">By Category</div>
          ${s.by_category.map(c=>`
            <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px;">
              <span style="color:var(--text)">${c.category}</span>
              <span style="color:var(--accent);font-weight:600">${c.count}</span>
            </div>
          `).join("")}
        </div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;">
          <div style="font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Staff Workload</div>
          ${s.by_staff.length===0?"<p style='color:var(--muted);font-size:13px'>No assignments yet</p>":s.by_staff.map(st=>`
            <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px;">
              <span style="color:var(--text)">${st.assigned_to}</span>
              <span style="color:var(--accent);font-weight:600">${st.count}</span>
            </div>
          `).join("")}
        </div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;margin-top:24px;text-align:left;">
        <div style="font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">7-Day Trend</div>
        <div style="display:flex;gap:12px;align-items:flex-end;height:80px;">
          ${s.daily_trend.slice().reverse().map(d=>{
            const h = s.daily_trend.length>0?Math.max(...s.daily_trend.map(x=>x.count)):1;
            const pct = Math.max(10,Math.round((d.count/h)*100));
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
              <div style="font-size:11px;color:var(--accent);font-weight:600">${d.count}</div>
              <div style="height:${pct}%;background:var(--accent);border-radius:4px;width:100%;min-height:8px;opacity:.7"></div>
              <div style="font-size:10px;color:var(--muted)">${d.day.slice(5)}</div>
            </div>`;
          }).join("")}
        </div>
      </div>
    `;
  } catch(e) { document.getElementById("analyticsContent").innerHTML = "<p style='color:var(--red)'>Error loading analytics</p>"; }
}

function closeModal(id) { document.getElementById(id).classList.remove("open"); }
document.querySelectorAll(".modal-overlay").forEach(m=>m.addEventListener("click",e=>{if(e.target===m)m.classList.remove("open");}));

async function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

loadComplaints();
</script>
</body>
